version: "3.9"

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command:
      - sh
      - -c
      - |
        if [ -n "$ANVIL_FORK_URL" ]; then
          anvil --host 0.0.0.0 --port 8545 --fork-url "$ANVIL_FORK_URL";
        else
          anvil --host 0.0.0.0 --port 8545;
        fi
    ports:
      - "8545:8545"
    environment:
      - ANVIL_FORK_URL

  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs-data:/data/ipfs

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: veritas
      POSTGRES_PASSWORD: veritas
      POSTGRES_DB: veritas
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  ipfs-data:
  pg-data:
